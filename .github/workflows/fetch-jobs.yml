name: Fetch Jobs Daily

on:
  schedule:
    - cron: '0 2 * * *'    # 2 AM UTC = 7:30 AM India
    - cron: '0 5 * * *'    # 5 AM UTC = 10:30 AM India
    - cron: '0 8 * * *'    # 8 AM UTC = 1:30 PM India
    - cron: '0 11 * * *'   # 11 AM UTC = 4:30 PM India
    - cron: '0 14 * * *'   # 2 PM UTC = 7:30 PM India
    - cron: '0 17 * * *'   # 5 PM UTC = 10:30 PM India
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Clean old jobs
        run: node cleanup-jobs.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Fetch new jobs
        run: node fetch-jobs.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
